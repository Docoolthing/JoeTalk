# https://docs.railway.com/reference/config-as-code
# In Railway → this *web* service → Settings: Root directory = `mobile`
#
# Variables (required at image build time):
#   BACKEND_BASE_URL — backend HTTPS origin, e.g. https://xxx.up.railway.app (no trailing slash)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
