# https://docs.railway.com/reference/config-as-code
# In Railway → this *web* service → Settings: Root directory = `mobile`
#
# Variables (runtime — required when the container starts):
#   BACKEND_BASE_URL — production API, e.g. https://jobtalk-api.up.railway.app (trailing / OK)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
