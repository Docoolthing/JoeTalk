name: joe_talk_mobile
description: English voice tutor app using Gemini backend proxy.
repository: https://github.com/Docoolthing/JoeTalk
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  path: ^1.9.0
  google_fonts: ^6.2.1
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
